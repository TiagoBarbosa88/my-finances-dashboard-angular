<section class="grid gap-4 lg:grid-cols-5">

  <!-- ── Donut: Categorias de Gastos ── -->
  <div class="surface-card lg:col-span-2">

    <!-- Cabeçalho do painel -->
    <div class="flex items-center justify-between gap-4">
      <h2 class="text-display text-lg font-semibold">Categorias de Gastos</h2>
      <span class="text-mono shrink-0 rounded-full border border-border px-2.5 py-0.5 text-xs">
        {{ finance.formatCurrency(pieTotal()) }}
      </span>
    </div>

    <!-- Gráfico donut SVG -->
    <div class="mt-4">
      <app-donut-chart
        [data]="pieData()"
        [centerText]="finance.formatCurrency(pieTotal())"
      />
    </div>

    <!-- Legenda de categorias -->
    <ul class="mt-4 grid grid-cols-2 gap-x-4 gap-y-2 text-xs">
      @for (item of pieData(); track item.name) {
        <li class="flex items-center justify-between gap-2">
          <span class="flex min-w-0 items-center gap-2 truncate text-muted-foreground">
            <span
              class="h-2 w-2 shrink-0 rounded-full"
              [style]="categoryDotStyle(item.name)"
            ></span>
            {{ item.name }}
          </span>
          <span class="text-mono text-foreground">
            {{ pieTotal() > 0 ? (item.value / pieTotal() * 100 | number:'1.0-0') : 0 }}%
          </span>
        </li>
      }
    </ul>

  </div>

  <!-- ── Barras: Metas por Categoria ── -->
  <div class="surface-card lg:col-span-3">

    <!-- Cabeçalho do painel -->
    <div class="flex flex-wrap items-center justify-between gap-4">
      <h2 class="text-display text-lg font-semibold">Metas por Categoria</h2>
      <div class="flex items-center gap-4 text-xs text-muted-foreground">
        <span class="flex items-center gap-1.5">
          <span class="h-2 w-2 rounded-full bg-primary"></span>
          Gasto
        </span>
        <span class="flex items-center gap-1.5">
          <span class="h-2 w-2 rounded-full bg-muted-foreground/40"></span>
          Meta
        </span>
      </div>
    </div>

    <!-- Gráfico de barras SVG: sem altura fixa — o SVG controla a proporção -->
    <div class="mt-4">
      <app-bar-chart [data]="barData()" />
    </div>

  </div>

</section>
