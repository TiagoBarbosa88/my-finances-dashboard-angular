<div class="surface-card group relative h-full overflow-hidden transition-shadow duration-300 hover:shadow-md hover:shadow-black/30">

  <!-- ── Glow decorativo de fundo ── -->
  <div [class]="glowClass()"></div>

  <!-- ── Topo: label + ícone ── -->
  <div class="relative flex items-start justify-between gap-3">

    <p class="text-sm font-medium tracking-wide text-muted-foreground">
      {{ label() }}
    </p>

    <!-- Ícone em caixa -->
    <div class="grid h-11 w-11 shrink-0 place-items-center rounded-xl bg-accent ring-1 ring-border/60 transition-colors group-hover:bg-accent/80">
      @switch (icon()) {

        @case ('wallet') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-[18px] w-[18px]">
            <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/>
            <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/>
            <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>
          </svg>
        }

        @case ('check') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-[18px] w-[18px]">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        }

        @case ('clock') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-[18px] w-[18px]">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        }

      }
    </div>
  </div>

  <!-- ── Valor principal ── -->
  <p class="text-display text-mono relative mt-3 text-3xl font-semibold tracking-tight tabular-nums">
    {{ value() }}
  </p>

  <!-- ── Separador ── -->
  <div class="relative mt-5 border-t border-border/50"></div>

  <!-- ── Rodapé: indicador de variação ── -->
  <div class="relative mt-3 flex items-center gap-1.5 text-xs">

    @if (positive()) {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="h-3.5 w-3.5 shrink-0 text-primary">
        <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
      </svg>
      <span class="font-medium text-primary">{{ change() }}</span>
    } @else {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="h-3.5 w-3.5 shrink-0 text-destructive">
        <line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/>
      </svg>
      <span class="font-medium text-destructive">{{ change() }}</span>
    }

  </div>

</div>
