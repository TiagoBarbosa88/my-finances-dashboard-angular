<div [class]="cardClass()">

  <!-- ── Glow decorativo de fundo ── -->
  <div [class]="glowClass()"></div>

  <!-- ── Topo: label + ícone ── -->
  <div class="relative flex items-start justify-between gap-2">

    <p class="text-sm font-medium tracking-wide text-muted-foreground">
      {{ label() }}
    </p>

    <div [class]="iconBoxClass()">
      @switch (icon()) {

        @case ('wallet') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/>
            <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/>
            <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>
          </svg>
        }

        @case ('check') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        }

        @case ('clock') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        }

        @case ('trending-up') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
            <polyline points="17 6 23 6 23 12"/>
          </svg>
        }

        @case ('trending-down') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>
            <polyline points="17 18 23 18 23 12"/>
          </svg>
        }

      }
    </div>
  </div>

  <!-- ── Valor principal ── -->
  <p
    [class]="valueClass()"
    class="text-display text-mono relative mt-2 truncate text-lg font-semibold tracking-tight tabular-nums sm:text-xl"
  >
    {{ value() }}
  </p>

  <!-- ── Rodapé ── -->
  <p [class]="footerClass()" class="relative mt-2 text-xs font-medium">
    {{ change() }}
  </p>

</div>
