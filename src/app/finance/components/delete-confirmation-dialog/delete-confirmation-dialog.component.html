<div
  class="fixed inset-0 z-[60] flex items-center justify-center p-4
         bg-black/60 backdrop-blur-sm"
  role="alertdialog"
  aria-modal="true"
  aria-labelledby="delete-dialog-title"
>
  <div
    class="w-full max-w-sm rounded-2xl border border-border bg-card
           shadow-2xl shadow-black/40"
    (click)="$event.stopPropagation()"
  >
    <div class="px-6 py-5 text-center">
      <div
        class="mx-auto mb-3 grid h-10 w-10 place-items-center rounded-full
               bg-destructive/15 text-destructive"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </div>

      <h2 id="delete-dialog-title" class="text-display text-base font-semibold">
        Excluir lançamento?
      </h2>

      <p class="mt-1 truncate text-sm font-medium text-foreground">
        {{ transaction().descricao }}
      </p>
    </div>

    <div class="flex items-center justify-end gap-3 border-t border-border px-6 py-4">
      <button
        type="button"
        (click)="cancel.emit()"
        class="btn-cancel"
      >
        Cancelar
      </button>
      <button
        type="button"
        (click)="confirm.emit()"
        class="rounded-xl bg-destructive px-4 py-2 text-sm font-semibold
               text-destructive-foreground transition-all hover:brightness-110 active:scale-95"
      >
        Excluir
      </button>
    </div>
  </div>
</div>
