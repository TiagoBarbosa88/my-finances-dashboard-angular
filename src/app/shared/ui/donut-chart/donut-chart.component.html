<div class="relative mx-auto h-[240px] w-[240px]">
  @if (data().length > 0) {
    <svg viewBox="0 0 240 240" class="h-full w-full" role="img" aria-label="Gráfico de categorias de gastos">
      @for (arc of arcs(); track arc.name) {
        <g
          class="donut-slice"
          [class.donut-slice--dimmed]="isDimmed(arc.name)"
          [class.donut-slice--highlighted]="isHighlighted(arc.name)"
          [attr.title]="tooltipFor(arc)"
          [attr.aria-label]="tooltipFor(arc)"
          (mouseenter)="onSliceEnter(arc.name)"
          (mouseleave)="onSliceLeave()"
        >
          <path [attr.d]="arc.d" [attr.fill]="arc.color" />
        </g>
      }
    </svg>

    <div class="pointer-events-none absolute inset-0 flex flex-col items-center justify-center gap-0.5">
      <span class="text-xs text-muted-foreground">{{ centerSub() }}</span>
      <span class="text-display text-mono text-xl font-semibold">{{ centerText() }}</span>
    </div>
  } @else {
    <div class="flex h-full items-center justify-center text-sm italic text-muted-foreground">
      Sem gastos registrados
    </div>
  }
</div>
