@if (visible()) {
  <div
    class="pwa-install-banner fixed inset-x-0 z-40 border-t border-border
           bg-sidebar/95 px-4 py-3 backdrop-blur-xl md:hidden"
    [class.pwa-install-banner--above-nav]="aboveNav()"
    role="region"
    aria-label="Instalar aplicativo"
  >
    <div class="mx-auto flex max-w-lg items-center gap-3">
      <div class="min-w-0 flex-1">
        <p class="text-sm font-semibold text-foreground">Instale o {{ appName }}</p>
        <p class="text-xs text-muted-foreground">
          Acesse como app no celular, em tela cheia.
        </p>
      </div>
      <div class="flex shrink-0 gap-2">
        <button
          type="button"
          (click)="dismiss()"
          class="cursor-pointer rounded-lg px-2.5 py-1.5 text-xs font-medium text-muted-foreground
                 transition-colors hover:text-foreground"
        >
          Agora não
        </button>
        <button
          type="button"
          (click)="install()"
          class="cursor-pointer rounded-lg bg-primary px-3 py-1.5 text-xs font-semibold
                 text-primary-foreground shadow-sm transition-all hover:brightness-110"
        >
          Instalar
        </button>
      </div>
    </div>
  </div>
}
