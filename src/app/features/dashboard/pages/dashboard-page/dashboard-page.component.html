<div class="flex flex-col gap-6">

  <!-- ═══════════════ TOPBAR ═══════════════ -->
  <header class="flex flex-col gap-4">

    <!-- Mobile: saudação em destaque -->
    <div class="flex items-start justify-between gap-3 md:hidden">
      <div class="min-w-0">
        <p class="text-display truncate text-xl font-semibold">{{ auth.saudacao() }}</p>
        <p class="mt-0.5 text-xs text-muted-foreground">Controle de Gastos</p>
      </div>
      <button
        type="button"
        aria-label="Notificações"
        class="grid h-10 w-10 shrink-0 place-items-center rounded-xl border border-border
               bg-card transition-colors hover:bg-accent"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
    </div>

    <!-- Desktop: título + saudação e notificações -->
    <div class="hidden items-center justify-between gap-4 md:flex">
      <h1 class="text-display text-3xl font-semibold">Controle de Gastos</h1>
      <div class="flex items-center gap-4">
        <p class="text-sm text-muted-foreground">{{ auth.saudacao() }}</p>
        <button
          type="button"
          aria-label="Notificações"
          class="grid h-10 w-10 shrink-0 place-items-center rounded-xl border border-border
                 bg-card transition-colors hover:bg-accent"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Navegador de mês -->
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex w-full items-center justify-center sm:w-fit">
        <div class="flex w-full max-w-xs items-center justify-between gap-2 rounded-xl border border-border bg-card p-1 sm:w-fit sm:max-w-none">
          <button
            type="button"
            (click)="finance.prevMonth()"
            aria-label="Mês anterior"
            class="grid h-9 w-9 shrink-0 place-items-center rounded-lg transition-colors hover:bg-accent"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>

          <span class="min-w-[8.5rem] flex-1 text-center text-sm font-medium sm:min-w-[130px] sm:flex-none">
            {{ finance.monthLabel() }} {{ finance.yearLabel() }}
          </span>

          <button
            type="button"
            (click)="finance.nextMonth()"
            aria-label="Próximo mês"
            class="grid h-9 w-9 shrink-0 place-items-center rounded-lg transition-colors hover:bg-accent"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Busca — desktop/tablet -->
      <div class="hidden sm:block sm:flex-1 sm:max-w-xs md:max-w-none md:flex md:justify-end">
        <div class="relative w-full md:w-64">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="search"
            placeholder="Buscar lançamento..."
            [value]="finance.termoBusca()"
            (input)="finance.termoBusca.set($any($event.target).value)"
            class="h-10 w-full rounded-xl border border-border bg-card pl-9 pr-3 text-sm
                   outline-none ring-ring placeholder:text-muted-foreground focus:ring-1"
          />
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════ CARDS DE RESUMO ═══════════════ -->
  <section class="grid grid-cols-2 gap-4 md:grid-cols-4">
    @for (card of summaryCards(); track card.label) {
      <app-summary-card
        [label]="card.label"
        [value]="card.value"
        [change]="card.change"
        [positive]="card.positive"
        [variant]="card.variant"
        [valueTone]="card.valueTone"
        [icon]="card.icon"
      />
    }
  </section>

  <!-- ═══════════════ GRÁFICOS ═══════════════ -->
  <app-category-chart
    [pieData]="finance.pieData()"
    [barData]="finance.barData()"
    [pieTotal]="finance.pieTotal()"
  />

  <!-- ═══════════════ TABELA DE LANÇAMENTOS ═══════════════ -->
  <app-transactions-table
    [transactions]="finance.filteredTransactions()"
    [scrollableList]="true"
    (viewAll)="openAllTransactions()"
    (edit)="openEditTransaction($event)"
  />

  <!-- ═══════════════ MODAL TODOS OS LANÇAMENTOS ═══════════════ -->
  @if (showAllTransactions()) {
    <app-all-transactions-modal
      [transactions]="finance.filteredTransactions()"
      (close)="showAllTransactions.set(false)"
      (edit)="openEditTransaction($event); showAllTransactions.set(false)"
    />
  }

  <!-- ═══════════════ MODAL NOVO LANÇAMENTO / EDIÇÃO ═══════════════ -->
  @if (showDialog()) {
    <app-new-transaction-dialog
      [transaction]="editingTransaction()"
      (close)="closeTransactionDialog()"
    />
  }

</div>

<!-- ═══════════════ FAB — sempre visível ═══════════════ -->
<!--
  Idêntico ao React:
    - fixed bottom-20 right-5 (mobile)    md:bottom-8 md:right-8 (desktop)
    - rounded-full, h-14
    - Ícone + sempre visível; texto oculto em xs, visível a partir de sm
-->
<!-- FAB — Admin e Editor -->
<button
  *appHasRole="['admin', 'editor']"
  type="button"
  (click)="openNewTransaction()"
  aria-label="Novo lançamento"
  class="app-fab inline-flex h-14 items-center gap-2 rounded-full bg-primary px-5
         text-sm font-semibold text-primary-foreground glow-primary shadow-lg shadow-primary/30
         transition-transform hover:scale-105 active:scale-95 md:px-6"
>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
       stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 shrink-0">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
  <span class="hidden sm:inline">Novo Lançamento</span>
</button>
