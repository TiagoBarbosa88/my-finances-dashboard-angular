<div class="flex flex-col gap-6 pb-24 md:pb-10">

  <!-- ═══════════════ TOPBAR ═══════════════ -->
  <header class="flex flex-col gap-4">

    <!-- Mobile: saudação + subtítulo + atualizar -->
    <div class="flex items-start justify-between gap-3 md:hidden">
      <div class="min-w-0">
        <p class="text-display truncate text-xl font-semibold">{{ auth.saudacao() }}</p>
        <p class="mt-0.5 text-xs text-muted-foreground">Investimentos</p>
      </div>
      <button
        type="button"
        (click)="atualizarCotacoes()"
        [disabled]="finance.quotesLoading()"
        aria-label="Atualizar cotações"
        class="inline-flex h-10 shrink-0 items-center gap-2 rounded-xl border border-border bg-card
               px-3 text-sm font-medium transition-colors hover:bg-accent
               disabled:cursor-not-allowed disabled:opacity-60"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"
             class="h-4 w-4" [class.animate-spin]="finance.quotesLoading()">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
      </button>
    </div>

    <!-- Desktop: título + saudação + atualizar -->
    <div class="hidden items-center justify-between gap-4 md:flex">
      <h1 class="text-display text-3xl font-semibold">Investimentos</h1>
      <div class="flex items-center gap-4">
        <p class="text-sm text-muted-foreground">{{ auth.saudacao() }}</p>
        <button
          type="button"
          (click)="atualizarCotacoes()"
          [disabled]="finance.quotesLoading()"
          class="inline-flex h-10 items-center gap-2 rounded-xl border border-border bg-card
                 px-3 text-sm font-medium transition-colors hover:bg-accent
                 disabled:cursor-not-allowed disabled:opacity-60"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               class="h-4 w-4" [class.animate-spin]="finance.quotesLoading()">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
          </svg>
          {{ finance.quotesLoading() ? 'Atualizando…' : 'Atualizar Cotações' }}
        </button>
      </div>
    </div>

  </header>

  <!-- ═══════════════ CARDS DE RESUMO (igual ao Painel) ═══════════════ -->
  <section class="grid grid-cols-2 gap-4 md:grid-cols-4">
    @for (card of summaryCards(); track card.label) {
      <app-summary-card
        [label]="card.label"
        [value]="card.value"
        [change]="card.change"
        [positive]="card.positive"
        [variant]="card.variant"
        [valueTone]="card.valueTone"
        [icon]="card.icon"
      />
    }
  </section>

  <!-- ═══════════════ GRÁFICOS (lado a lado) ═══════════════ -->
  <section class="grid grid-cols-1 items-stretch gap-4 md:grid-cols-2">
    <app-distribuicao-ativos-barras
      class="h-full"
      [grupos]="finance.ativosPorTipo()"
    />

    <app-distribuicao-classe-chart
      class="h-full"
      [data]="finance.distribuicaoPorClasse()"
      [patrimonio]="finance.distribuicaoPatrimonio()"
      centerSub="Patrimônio"
    />
  </section>

  <!-- ═══════════════ METAS DE ALOCAÇÃO ═══════════════ -->
  <app-investimentos-metas />

  <!-- Tabela de ativos -->
  <app-meus-ativos-table
    [grupos]="finance.ativosPorTipo()"
    [showActions]="auth.canManageInvestments()"
    (edit)="openEditAtivo($event)"
  />

  @if (showDialog()) {
    <app-new-investment-dialog
      [investimento]="editingInvestimento()"
      [ativo]="editingAtivo()"
      (close)="closeInvestmentDialog()"
    />
  }

</div>

<!-- FAB — Admin e Editor -->
<button
  *appHasRole="['admin', 'editor']"
  type="button"
  (click)="openNewInvestment()"
  aria-label="Adicionar investimento"
  class="app-fab app-fab-invest inline-flex h-14 items-center gap-2 rounded-full px-5
         text-sm font-semibold transition-transform hover:scale-105 active:scale-95 md:px-6"
>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
       stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 shrink-0">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
  <span class="hidden sm:inline">Adicionar Investimento</span>
</button>
