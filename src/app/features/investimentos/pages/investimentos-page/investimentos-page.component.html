<div class="flex flex-col gap-6 pb-24 md:pb-10">

  <!-- ═══════════════ TOPBAR ═══════════════ -->
  <header class="flex flex-col gap-4">
    <div class="grid grid-cols-2 items-center gap-4">
      <h1 class="text-display min-w-0 truncate text-2xl font-semibold sm:text-3xl">
        Investimentos
      </h1>
      <div class="flex flex-wrap items-center justify-end gap-3">
        <button
          type="button"
          (click)="atualizarCotacoes()"
          [disabled]="finance.quotesLoading()"
          class="inline-flex h-10 items-center gap-2 rounded-xl border border-border bg-card
                 px-3 text-sm font-medium transition-colors hover:bg-accent
                 disabled:cursor-not-allowed disabled:opacity-60"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               class="h-4 w-4" [class.animate-spin]="finance.quotesLoading()">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
          </svg>
          <span class="hidden sm:inline">
            {{ finance.quotesLoading() ? 'Atualizando…' : 'Atualizar Cotações' }}
          </span>
        </button>

        <p class="text-sm text-muted-foreground">
          {{ getSaudacao() }}
        </p>
        <button
          type="button"
          aria-label="Notificações"
          class="grid h-10 w-10 shrink-0 place-items-center rounded-xl border border-border
                 bg-card transition-colors hover:bg-accent"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
    </div>

  </header>

  <!-- ═══════════════ CARDS DE RESUMO (igual ao Painel) ═══════════════ -->
  <section class="grid grid-cols-2 gap-4 md:grid-cols-4">
    @for (card of summaryCards(); track card.label) {
      <app-summary-card
        [label]="card.label"
        [value]="card.value"
        [change]="card.change"
        [positive]="card.positive"
        [variant]="card.variant"
        [valueTone]="card.valueTone"
        [icon]="card.icon"
      />
    }
  </section>

  <!-- ═══════════════ GRÁFICOS (lado a lado) ═══════════════ -->
  <section class="grid grid-cols-1 items-stretch gap-4 md:grid-cols-2">
    <app-distribuicao-ativos-barras
      class="h-full"
      [grupos]="finance.ativosPorTipo()"
    />

    <app-distribuicao-classe-chart
      class="h-full"
      [data]="finance.distribuicaoPorClasse()"
      [patrimonio]="finance.distribuicaoPatrimonio()"
      centerSub="Patrimônio"
    />
  </section>

  <!-- ═══════════════ METAS DE ALOCAÇÃO ═══════════════ -->
  <app-investimentos-metas />

  <!-- Tabela de ativos -->
  <app-meus-ativos-table
    [grupos]="finance.ativosPorTipo()"
    [showActions]="auth.canManageInvestments()"
    (edit)="openEditAtivo($event)"
  />

  @if (showDialog()) {
    <app-new-investment-dialog
      [investimento]="editingInvestimento()"
      [ativo]="editingAtivo()"
      (close)="closeInvestmentDialog()"
    />
  }

</div>

<!-- FAB — Admin e Editor -->
<button
  *appHasRole="['admin', 'editor']"
  type="button"
  (click)="openNewInvestment()"
  aria-label="Adicionar investimento"
  class="fixed bottom-6 right-6 z-40 inline-flex h-14 items-center gap-2
         rounded-full bg-blue-800 px-5 text-sm font-semibold text-white
         shadow-lg shadow-blue-900/40
         transition-transform hover:scale-105 hover:bg-blue-700 active:scale-95
         md:bottom-8 md:right-8 md:px-6"
>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
       stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 shrink-0">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
  <span class="hidden sm:inline">Adicionar Investimento</span>
</button>
