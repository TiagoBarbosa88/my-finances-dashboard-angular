<app-auth-layout>
  <div class="flex flex-col items-center gap-6 text-center">
    <div
      class="grid h-16 w-16 place-items-center rounded-2xl bg-primary text-primary-foreground glow-primary"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" class="h-8 w-8">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>

    <div class="space-y-2">
      <h1 class="text-display text-2xl font-bold">Bem-vindo ao {{ appName }}!</h1>
      <p class="text-sm text-muted-foreground">
        Olá, <span class="font-medium text-foreground">{{ nome() }}</span>.
        Sua conta foi ativada com sucesso.
      </p>
    </div>

    <p class="text-sm leading-relaxed text-muted-foreground">
      Você já pode acessar o painel financeiro, acompanhar lançamentos e colaborar com sua equipe.
    </p>

    <button
      type="button"
      (click)="goToApp()"
      class="mt-2 flex w-full items-center justify-center gap-2 rounded-xl
             bg-primary py-2.5 text-sm font-semibold text-primary-foreground
             glow-primary shadow-sm shadow-primary/20
             transition-all hover:brightness-110 active:scale-95"
    >
      Ir para o painel
    </button>
  </div>
</app-auth-layout>
