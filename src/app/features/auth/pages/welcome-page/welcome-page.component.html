<app-auth-layout>
  <div class="flex flex-col gap-6">
    <div class="space-y-2 text-center">
      <div
        class="mx-auto grid h-14 w-14 place-items-center rounded-2xl bg-primary text-primary-foreground glow-primary"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" class="h-7 w-7">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>

      <h1 class="text-display text-2xl font-bold">Bem-vindo ao {{ appName }}!</h1>
      <p class="text-sm text-muted-foreground">
        Olá, <span class="font-medium text-foreground">{{ nome() }}</span>.
        Antes de continuar, crie uma senha para entrar novamente depois.
      </p>
    </div>

    <form class="space-y-4" autocomplete="off" (ngSubmit)="savePasswordAndContinue()">
      @if (error()) {
        <div
          class="flex items-center gap-2.5 rounded-xl border border-destructive/30
                 bg-destructive/10 px-4 py-3 text-sm text-destructive"
          role="alert"
        >
          {{ error() }}
        </div>
      }

      @if (success()) {
        <div
          class="rounded-xl border border-primary/30 bg-primary/10 px-4 py-3 text-sm text-primary"
          role="status"
        >
          {{ success() }}
        </div>
      }

      <div class="space-y-1.5">
        <label for="password" class="text-sm font-medium">Nova senha</label>
        <div class="relative">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            name="welcome-password"
            autocomplete="off"
            placeholder="Mínimo 6 caracteres"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            class="w-full rounded-xl border border-border bg-background px-3.5 py-2.5
                   pr-11 text-sm text-foreground placeholder:text-muted-foreground
                   outline-none ring-ring transition-colors focus:border-primary/60 focus:ring-1"
          />
          <button
            type="button"
            (click)="showPassword.set(!showPassword())"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground
                   transition-colors hover:text-foreground"
            [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
          >
            @if (showPassword()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="confirm-password" class="text-sm font-medium">Confirmar senha</label>
        <input
          id="confirm-password"
          [type]="showPassword() ? 'text' : 'password'"
          name="welcome-confirm-password"
          autocomplete="off"
          placeholder="Repita a senha"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
          class="w-full rounded-xl border border-border bg-background px-3.5 py-2.5 text-sm
                 text-foreground placeholder:text-muted-foreground outline-none ring-ring
                 transition-colors focus:border-primary/60 focus:ring-1"
        />
      </div>

      <button
        type="submit"
        [disabled]="saving()"
        class="mt-2 flex w-full items-center justify-center gap-2 rounded-xl
               bg-primary py-2.5 text-sm font-semibold text-primary-foreground
               glow-primary shadow-sm shadow-primary/20 transition-all
               hover:brightness-110 active:scale-95 disabled:cursor-not-allowed disabled:opacity-60"
      >
        @if (saving()) {
          <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          Salvando…
        } @else {
          Salvar senha e ir para o painel
        }
      </button>
    </form>

    <p class="text-center text-xs text-muted-foreground">
      Você usará esta senha com o e-mail do convite na tela de login.
    </p>
  </div>
</app-auth-layout>
