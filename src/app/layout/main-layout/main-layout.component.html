<!--
  Shell principal — sistema de espaçamento:
  - Container: mx-auto max-w-7xl (centraliza e limita largura)
  - Main: padding lateral/superior para não colar nas bordas
  - md:pl-[88px] → compensa sidebar fixa (72px + 16px)
  - pb-24 / md:pb-10 → reserva espaço para bottom nav mobile
-->
<div class="min-h-screen bg-background">

  <app-app-sidebar />

  <main class="px-4 pb-24 pt-6
               md:pb-10 md:pl-[88px] md:pr-6 md:pt-8
               lg:pl-[96px] lg:pr-8">
    <div class="mx-auto w-full max-w-7xl">
      <router-outlet />
    </div>
  </main>

  <app-pwa-install-banner [aboveNav]="true" />

</div>
